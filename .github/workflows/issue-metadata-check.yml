name: Check issue metadata

on:
  issues:
    types:
      - opened
      - edited
      - reopened
      - transferred

permissions:
  issues: read
  contents: read

concurrency:
  group: issue-metadata-check-${{ github.event.issue.number }}
  cancel-in-progress: true

jobs:
  check-native-metadata:
    name: Check native issue labels and milestone
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Check native metadata
        env:
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          ISSUE_LABELS: ${{ join(github.event.issue.labels.*.name, ',') }}
          ISSUE_MILESTONE: ${{ github.event.issue.milestone.title }}
        run: python3 .github/scripts/issue_metadata.py
