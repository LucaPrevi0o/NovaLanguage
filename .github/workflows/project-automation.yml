name: Project automation

on:
  issues:
    types:
      - opened
      - edited
      - reopened
      - transferred
      - closed
  pull_request:
    types:
      - opened
      - edited
      - reopened
      - ready_for_review
      - converted_to_draft
      - synchronize
      - closed
  workflow_dispatch:
    inputs:
      target:
        description: Automation target to run.
        required: true
        default: health
        type: choice
        options:
          - health
          - issue
          - pr
          - all-open
          - all-closed
          - drift
          - legacy-audit
      issue_number:
        description: Issue number for the issue target.
        required: false
        type: string
      pr_number:
        description: Pull request number for the pr target.
        required: false
        type: string
      fail_on_warning:
        description: Treat drift warnings or legacy audit findings as failures.
        required: false
        default: false
        type: boolean

permissions:
  contents: read
  issues: write
  pull-requests: read

concurrency:
  group: project-automation-${{ github.workflow }}-${{ github.event.issue.number || github.event.pull_request.number || github.run_id }}
  cancel-in-progress: false

env:
  GITHUB_TOKEN: ${{ github.token }}
  PROJECT_TOKEN: ${{ secrets.PROJECT_TOKEN }}
  PROJECT_OWNER: LucaPrevi0o
  PROJECT_NUMBER: "4"
  PROJECT_START_DATE_FIELD: Start date
  PROJECT_END_DATE_FIELD: End date
  PROJECT_PR_READY_STATUS: In Review

jobs:
  automation-health:
    name: Validate automation wiring
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'pull_request' || github.event_name == 'workflow_dispatch' }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Check workflow and script wiring
        run: python3 .github/scripts/automation_health.py

      - name: Check shared issue-form fields
        run: python3 .github/scripts/issue_forms.py --check

      - name: Check native metadata helper
        run: |
          python3 .github/scripts/issue_metadata.py \
            --issue-number 0 \
            --labels refactor \
            --milestone "Nova MVP compiler"

      - name: Run automation unit tests
        run: python3 -m unittest discover -s .github/tests -p "*_test.py"

      - name: Check Project helper syntax
        run: |
          python3 -m py_compile \
            .github/scripts/project_automation.py \
            .github/scripts/project_schedule.py \
            .github/scripts/pr_metadata_alignment.py

  check-issue-metadata:
    name: Check native issue metadata
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'issues' && github.event.action != 'closed' }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Check native metadata
        env:
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          ISSUE_LABELS: ${{ join(github.event.issue.labels.*.name, ',') }}
          ISSUE_MILESTONE: ${{ github.event.issue.milestone.title }}
        run: python3 .github/scripts/issue_metadata.py

  sync-issue:
    name: Sync issue into Project
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'issues' && github.event.action != 'closed' }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Sync issue Project fields
        run: |
          python3 .github/scripts/project_automation.py sync-issue \
            --repo "${GITHUB_REPOSITORY}" \
            --issue-number "${{ github.event.issue.number }}"

      - name: Preserve managed issue labels
        run: |
          python3 .github/scripts/project_automation.py sync-labels \
            --repo "${GITHUB_REPOSITORY}" \
            --issue-number "${{ github.event.issue.number }}"

      - name: Sync issue schedule dates
        run: |
          python3 .github/scripts/project_schedule.py \
            --repo "${GITHUB_REPOSITORY}" \
            --issue-number "${{ github.event.issue.number }}"

      - name: Ensure reopened issue is visible
        if: ${{ github.event.action == 'reopened' }}
        run: |
          python3 .github/scripts/project_automation.py sync-issue-archive \
            --repo "${GITHUB_REPOSITORY}" \
            --issue-number "${{ github.event.issue.number }}"

  sync-issue-archive:
    name: Sync issue archive state
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'issues' && (github.event.action == 'closed' || github.event.action == 'reopened') }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Sync issue archive state
        run: |
          python3 .github/scripts/project_automation.py sync-issue-archive \
            --repo "${GITHUB_REPOSITORY}" \
            --issue-number "${{ github.event.issue.number }}"

  align-pr-metadata:
    name: Align PR metadata
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'pull_request' && github.event.action != 'closed' }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Align pull request with referenced issues
        run: |
          python3 .github/scripts/pr_metadata_alignment.py \
            --repo "${GITHUB_REPOSITORY}" \
            --pr-number "${{ github.event.pull_request.number }}"

  sync-pr-status:
    name: Sync PR status to Project
    runs-on: ubuntu-latest
    needs: align-pr-metadata
    if: ${{ always() && github.event_name == 'pull_request' }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Sync referenced issue status
        run: |
          python3 .github/scripts/project_automation.py sync-pr-status \
            --repo "${GITHUB_REPOSITORY}" \
            --pr-number "${{ github.event.pull_request.number }}"

  check-roadmap-drift:
    name: Check roadmap alignment
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'pull_request' }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Check PLAN and Project alignment
        run: |
          python3 .github/scripts/project_automation.py check-plan-drift \
            --repo "${GITHUB_REPOSITORY}" \
            --plan PLAN.md \
            --readme README.md

  manual-dispatch:
    name: Run selected automation target
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'workflow_dispatch' }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Run selected target
        shell: bash
        env:
          TARGET: ${{ inputs.target }}
          ISSUE_NUMBER: ${{ inputs.issue_number }}
          PR_NUMBER: ${{ inputs.pr_number }}
          FAIL_ON_WARNING: ${{ inputs.fail_on_warning }}
        run: |
          set -euo pipefail

          require_value() {
            local value="$1"
            local name="$2"
            if [ -z "${value}" ]; then
              echo "::error::${name} is required for target '${TARGET}'."
              exit 1
            fi
          }

          case "${TARGET}" in
            health)
              python3 .github/scripts/automation_health.py
              python3 .github/scripts/issue_forms.py --check
              python3 .github/scripts/issue_metadata.py \
                --issue-number 0 \
                --labels refactor \
                --milestone "Nova MVP compiler"
              python3 -m unittest discover -s .github/tests -p "*_test.py"
              ;;
            issue)
              require_value "${ISSUE_NUMBER}" issue_number
              python3 .github/scripts/project_automation.py sync-issue \
                --repo "${GITHUB_REPOSITORY}" \
                --issue-number "${ISSUE_NUMBER}"
              python3 .github/scripts/project_automation.py sync-labels \
                --repo "${GITHUB_REPOSITORY}" \
                --issue-number "${ISSUE_NUMBER}"
              python3 .github/scripts/project_schedule.py \
                --repo "${GITHUB_REPOSITORY}" \
                --issue-number "${ISSUE_NUMBER}"
              python3 .github/scripts/project_automation.py sync-issue-archive \
                --repo "${GITHUB_REPOSITORY}" \
                --issue-number "${ISSUE_NUMBER}"
              ;;
            pr)
              require_value "${PR_NUMBER}" pr_number
              python3 .github/scripts/pr_metadata_alignment.py \
                --repo "${GITHUB_REPOSITORY}" \
                --pr-number "${PR_NUMBER}"
              python3 .github/scripts/project_automation.py sync-pr-status \
                --repo "${GITHUB_REPOSITORY}" \
                --pr-number "${PR_NUMBER}"
              ;;
            all-open)
              python3 .github/scripts/project_automation.py sync-issue \
                --repo "${GITHUB_REPOSITORY}" \
                --all-open
              python3 .github/scripts/project_automation.py sync-labels \
                --repo "${GITHUB_REPOSITORY}" \
                --all-open
              python3 .github/scripts/project_schedule.py \
                --repo "${GITHUB_REPOSITORY}" \
                --all-open
              python3 .github/scripts/project_automation.py sync-issue-archive \
                --repo "${GITHUB_REPOSITORY}" \
                --all-open
              ;;
            all-closed)
              python3 .github/scripts/project_automation.py sync-issue-archive \
                --repo "${GITHUB_REPOSITORY}" \
                --all-closed
              ;;
            drift)
              args=()
              if [ "${FAIL_ON_WARNING}" = "true" ]; then
                args+=(--fail-on-warning)
              fi
              python3 .github/scripts/project_automation.py check-plan-drift \
                --repo "${GITHUB_REPOSITORY}" \
                --plan PLAN.md \
                --readme README.md \
                "${args[@]}"
              ;;
            legacy-audit)
              args=()
              if [ "${FAIL_ON_WARNING}" = "true" ]; then
                args+=(--fail-on-findings)
              fi
              python3 .github/scripts/project_automation.py audit-legacy-metadata \
                --repo "${GITHUB_REPOSITORY}" \
                --all-open \
                "${args[@]}"
              ;;
            *)
              echo "::error::Unknown target '${TARGET}'."
              exit 1
              ;;
          esac
