name: Check roadmap and Project drift

on:
  pull_request:
    paths:
      - "PLAN.md"
      - "README.md"
      - "docs/**"
      - ".github/scripts/project_automation.py"
      - ".github/workflows/project-*.yml"
  workflow_dispatch:
    inputs:
      fail_on_warning:
        description: Treat drift warnings as failures.
        required: false
        default: false
        type: boolean

permissions:
  contents: read
  issues: read

concurrency:
  group: project-drift-check-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check-drift:
    name: Check roadmap alignment
    runs-on: ubuntu-latest

    env:
      GITHUB_TOKEN: ${{ github.token }}
      PROJECT_TOKEN: ${{ secrets.PROJECT_TOKEN }}
      PROJECT_OWNER: LucaPrevi0o
      PROJECT_NUMBER: "4"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Check PLAN and Project alignment
        run: |
          args=()
          if [ "${{ inputs.fail_on_warning || 'false' }}" = "true" ]; then
            args+=(--fail-on-warning)
          fi

          python3 .github/scripts/project_automation.py check-plan-drift \
            --repo "${GITHUB_REPOSITORY}" \
            --plan PLAN.md \
            --readme README.md \
            "${args[@]}"
