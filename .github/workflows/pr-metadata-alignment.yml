name: Align PR metadata

on:
  pull_request:
    types:
      - opened
      - edited
      - reopened
      - ready_for_review
      - converted_to_draft
      - synchronize
  workflow_dispatch:
    inputs:
      pr_number:
        description: Pull request number to align.
        required: true
        type: string

permissions:
  contents: read
  issues: write
  pull-requests: read

concurrency:
  group: pr-metadata-alignment-${{ github.event.pull_request.number || inputs.pr_number }}
  cancel-in-progress: false

jobs:
  align-pr-metadata:
    name: Align PR metadata
    runs-on: ubuntu-latest

    env:
      GITHUB_TOKEN: ${{ github.token }}
      PROJECT_TOKEN: ${{ secrets.PROJECT_TOKEN }}
      PROJECT_OWNER: LucaPrevi0o
      PROJECT_NUMBER: "4"
      PROJECT_PR_READY_STATUS: In Review

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Align pull request event
        if: ${{ github.event_name == 'pull_request' }}
        run: |
          python3 .github/scripts/pr_metadata_alignment.py \
            --repo "${GITHUB_REPOSITORY}" \
            --pr-number "${{ github.event.pull_request.number }}"

      - name: Align requested pull request
        if: ${{ github.event_name == 'workflow_dispatch' }}
        run: |
          python3 .github/scripts/pr_metadata_alignment.py \
            --repo "${GITHUB_REPOSITORY}" \
            --pr-number "${{ inputs.pr_number }}"
