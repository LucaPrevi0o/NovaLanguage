name: Sync PR status to Project

on:
  pull_request:
    types:
      - opened
      - edited
      - reopened
      - ready_for_review
      - converted_to_draft
      - closed
  workflow_dispatch:
    inputs:
      pr_number:
        description: Pull request number to inspect.
        required: true
        type: string

permissions:
  contents: read
  issues: write
  pull-requests: read

concurrency:
  group: project-pr-status-${{ github.event.pull_request.number || inputs.pr_number }}
  cancel-in-progress: false

jobs:
  sync-pr-status:
    name: Sync referenced issue status
    runs-on: ubuntu-latest

    env:
      GITHUB_TOKEN: ${{ github.token }}
      PROJECT_TOKEN: ${{ secrets.PROJECT_TOKEN }}
      PROJECT_OWNER: LucaPrevi0o
      PROJECT_NUMBER: "4"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Sync pull request event
        if: ${{ github.event_name == 'pull_request' }}
        run: |
          python3 .github/scripts/project_automation.py sync-pr-status \
            --repo "${GITHUB_REPOSITORY}" \
            --pr-number "${{ github.event.pull_request.number }}"

      - name: Sync requested pull request
        if: ${{ github.event_name == 'workflow_dispatch' }}
        run: |
          python3 .github/scripts/project_automation.py sync-pr-status \
            --repo "${GITHUB_REPOSITORY}" \
            --pr-number "${{ inputs.pr_number }}"
