name: Sync issue archive state

on:
  issues:
    types:
      - closed
      - reopened
  workflow_dispatch:
    inputs:
      issue_number:
        description: Issue number to sync. Leave empty when syncing a bulk set.
        required: false
        type: string
      sync_all_closed:
        description: Sync archive state for every closed issue.
        required: false
        default: false
        type: boolean
      sync_all_open:
        description: Sync archive state for every open issue.
        required: false
        default: false
        type: boolean

permissions:
  contents: read
  issues: read

concurrency:
  group: project-archive-sync-${{ github.event.issue.number || github.run_id }}
  cancel-in-progress: false

jobs:
  sync-issue-archive:
    name: Sync issue archive state
    runs-on: ubuntu-latest

    env:
      GITHUB_TOKEN: ${{ github.token }}
      PROJECT_TOKEN: ${{ secrets.PROJECT_TOKEN }}
      PROJECT_OWNER: LucaPrevi0o
      PROJECT_NUMBER: "4"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Sync issue event archive state
        if: ${{ github.event_name == 'issues' }}
        run: |
          python3 .github/scripts/project_automation.py sync-issue-archive \
            --repo "${GITHUB_REPOSITORY}" \
            --issue-number "${{ github.event.issue.number }}"

      - name: Sync requested issue
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.sync_all_closed == false && inputs.sync_all_open == false && inputs.issue_number != '' }}
        run: |
          python3 .github/scripts/project_automation.py sync-issue-archive \
            --repo "${GITHUB_REPOSITORY}" \
            --issue-number "${{ inputs.issue_number }}"

      - name: Sync all closed issues
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.sync_all_closed == true && inputs.sync_all_open == false }}
        run: |
          python3 .github/scripts/project_automation.py sync-issue-archive \
            --repo "${GITHUB_REPOSITORY}" \
            --all-closed

      - name: Sync all open issues
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.sync_all_open == true && inputs.sync_all_closed == false }}
        run: |
          python3 .github/scripts/project_automation.py sync-issue-archive \
            --repo "${GITHUB_REPOSITORY}" \
            --all-open

      - name: Reject conflicting bulk inputs
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.sync_all_closed == true && inputs.sync_all_open == true }}
        run: |
          echo "::error::Choose either sync_all_closed or sync_all_open, not both."
          exit 1

      - name: Require manual input
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.sync_all_closed == false && inputs.sync_all_open == false && inputs.issue_number == '' }}
        run: |
          echo "::error::Provide issue_number, enable sync_all_closed, or enable sync_all_open."
          exit 1
