name: Sync issues to Project

on:
  issues:
    types:
      - opened
      - edited
      - reopened
      - transferred
  workflow_dispatch:
    inputs:
      issue_number:
        description: Issue number to sync. Leave empty when syncing every open issue.
        required: false
        type: string
      sync_all_open:
        description: Sync every open issue in the repository.
        required: false
        default: false
        type: boolean

permissions:
  contents: read
  issues: write

concurrency:
  group: project-sync-${{ github.event.issue.number || github.run_id }}
  cancel-in-progress: false

jobs:
  sync-issue:
    name: Sync issue metadata
    runs-on: ubuntu-latest

    env:
      GITHUB_TOKEN: ${{ github.token }}
      PROJECT_TOKEN: ${{ secrets.PROJECT_TOKEN }}
      PROJECT_OWNER: LucaPrevi0o
      PROJECT_NUMBER: "4"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Sync issue event metadata
        if: ${{ github.event_name == 'issues' }}
        run: |
          python3 .github/scripts/project_automation.py sync-issue \
            --repo "${GITHUB_REPOSITORY}" \
            --issue-number "${{ github.event.issue.number }}" \
            --strict

      - name: Sync requested issue
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.sync_all_open == false && inputs.issue_number != '' }}
        run: |
          python3 .github/scripts/project_automation.py sync-issue \
            --repo "${GITHUB_REPOSITORY}" \
            --issue-number "${{ inputs.issue_number }}" \
            --strict

      - name: Sync all open issues
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.sync_all_open == true }}
        run: |
          python3 .github/scripts/project_automation.py sync-issue \
            --repo "${GITHUB_REPOSITORY}" \
            --all-open

      - name: Require manual input
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.sync_all_open == false && inputs.issue_number == '' }}
        run: |
          echo "::error::Provide issue_number or enable sync_all_open."
          exit 1
