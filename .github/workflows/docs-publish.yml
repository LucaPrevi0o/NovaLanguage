name: Publish documentation

on:
  push:
    branches:
      - main
    paths:
      - "docs/**"
      - "src/**"
      - "pom.xml"
      - "README.md"
      - "PLAN.md"
      - ".github/scripts/**"
      - ".github/workflows/docs-publish.yml"
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: documentation-publish
  cancel-in-progress: true

jobs:
  publish-wiki:
    name: Mirror docs to GitHub Wiki
    runs-on: ubuntu-latest

    env:
      WIKI_TOKEN: ${{ secrets.WIKI_DEPLOY_TOKEN || github.token }}
      WIKI_REPOSITORY: ${{ github.repository }}.wiki.git
      PAGES_BASE_URL: https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Configure Git author
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Clone wiki repository
        run: |
          set -euo pipefail

          wiki_url="https://x-access-token:${WIKI_TOKEN}@github.com/${WIKI_REPOSITORY}"

          if ! git ls-remote "${wiki_url}" > /dev/null 2>&1; then
            echo "The GitHub Wiki repository does not exist yet or is not accessible."
            echo "Enable the Wiki tab and create the first page manually, then re-run this workflow."
            echo "If GITHUB_TOKEN cannot push to the wiki, add a WIKI_DEPLOY_TOKEN secret with repository/wiki write access."
            exit 1
          fi

          git clone "${wiki_url}" wiki-repo

      - name: Mirror Markdown documentation
        run: python3 .github/scripts/mirror_docs_to_wiki.py

      - name: Commit and push wiki changes
        working-directory: wiki-repo
        run: |
          set -euo pipefail

          if [ -z "$(git status --porcelain)" ]; then
            echo "Wiki is already up to date."
            exit 0
          fi

          git add --all
          git commit -m "docs: mirror repository documentation"
          git push

  build-javadoc:
    name: Build Javadoc site
    runs-on: ubuntu-latest

    env:
      PAGES_DEPLOY_TOKEN: ${{ secrets.PAGES_DEPLOY_TOKEN }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up JDK
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "26"
          cache: maven
          cache-dependency-path: pom.xml

      - name: Build tests and Javadoc
        run: ./mvnw -B -ntp test javadoc:javadoc

      - name: Prepare Pages site
        run: |
          set -euo pipefail

          mkdir -p _site/javadoc
          cp -R target/site/apidocs/. _site/javadoc/
          python3 .github/scripts/prepare_javadoc_site.py

      - name: Configure GitHub Pages
        if: ${{ env.PAGES_DEPLOY_TOKEN == '' }}
        uses: actions/configure-pages@v5

      - name: Configure or enable GitHub Pages
        if: ${{ env.PAGES_DEPLOY_TOKEN != '' }}
        uses: actions/configure-pages@v5
        with:
          token: ${{ env.PAGES_DEPLOY_TOKEN }}
          enablement: true

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: _site

  deploy-pages:
    name: Deploy Javadoc to GitHub Pages
    runs-on: ubuntu-latest
    needs: build-javadoc

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
