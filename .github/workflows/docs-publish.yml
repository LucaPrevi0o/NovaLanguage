name: Publish documentation

on:
  push:
    branches:
      - main
    paths:
      - "docs/**"
      - "src/**"
      - "pom.xml"
      - "README.md"
      - "PLAN.md"
      - ".github/workflows/docs-publish.yml"
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: documentation-publish
  cancel-in-progress: true

jobs:
  publish-wiki:
    name: Mirror docs to GitHub Wiki
    runs-on: ubuntu-latest

    env:
      WIKI_TOKEN: ${{ secrets.WIKI_DEPLOY_TOKEN || github.token }}
      WIKI_REPOSITORY: ${{ github.repository }}.wiki.git
      PAGES_BASE_URL: https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Configure Git author
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Clone wiki repository
        run: |
          set -euo pipefail

          wiki_url="https://x-access-token:${WIKI_TOKEN}@github.com/${WIKI_REPOSITORY}"

          if ! git ls-remote "${wiki_url}" > /dev/null 2>&1; then
            echo "The GitHub Wiki repository does not exist yet or is not accessible."
            echo "Enable the Wiki tab and create the first page manually, then re-run this workflow."
            echo "If GITHUB_TOKEN cannot push to the wiki, add a WIKI_DEPLOY_TOKEN secret with repository/wiki write access."
            exit 1
          fi

          git clone "${wiki_url}" wiki-repo

      - name: Mirror Markdown documentation
        run: |
          set -euo pipefail

          python3 <<'PY'
          from pathlib import Path
          import os
          import shutil

          root = Path.cwd()
          wiki = root / "wiki-repo"
          docs = root / "docs"
          pages_base_url = os.environ["PAGES_BASE_URL"].rstrip("/")

          def wiki_title(stem: str) -> str:
              parts = stem.replace("_", "-").split("-")
              return "-".join(part[:1].upper() + part[1:] for part in parts if part)

          for page in wiki.glob("*.md"):
              page.unlink()

          if (root / "README.md").exists():
              shutil.copyfile(root / "README.md", wiki / "Home.md")

          if (root / "PLAN.md").exists():
              shutil.copyfile(root / "PLAN.md", wiki / "Compiler-Upgrade-Plan.md")

          copied_docs = []
          if docs.exists():
              for source in sorted(docs.glob("*.md")):
                  title = wiki_title(source.stem)
                  destination = wiki / f"{title}.md"
                  shutil.copyfile(source, destination)
                  copied_docs.append((title.replace("-", " "), title))

          sidebar_lines = [
              "# NovaLanguage",
              "",
              "- [Home](Home)",
              "- [Compiler Upgrade Plan](Compiler-Upgrade-Plan)",
              "",
              "## Documentation",
              "",
          ]

          for label, target in copied_docs:
              sidebar_lines.append(f"- [{label}]({target})")

          sidebar_lines.extend([
              "",
              "## API",
              "",
              f"- [Generated Javadoc]({pages_base_url}/javadoc/)",
              "",
          ])

          (wiki / "_Sidebar.md").write_text("\n".join(sidebar_lines), encoding="utf-8")

          api_reference = f"""# API Reference

          The generated Javadoc is published automatically from the `main` branch.

          - [Open generated Javadoc]({pages_base_url}/javadoc/)

          The Javadoc is generated by GitHub Actions from the current Java sources and deployed through GitHub Pages.
          """

          (wiki / "API-Reference.md").write_text(api_reference.strip() + "\n", encoding="utf-8")
          PY

      - name: Commit and push wiki changes
        working-directory: wiki-repo
        run: |
          set -euo pipefail

          if [ -z "$(git status --porcelain)" ]; then
            echo "Wiki is already up to date."
            exit 0
          fi

          git add --all
          git commit -m "docs: mirror repository documentation"
          git push

  build-javadoc:
    name: Build Javadoc site
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up JDK
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "26"
          cache: maven
          cache-dependency-path: pom.xml

      - name: Build tests and Javadoc
        run: ./mvnw -B -ntp test javadoc:javadoc

      - name: Prepare Pages site
        run: |
          set -euo pipefail

          mkdir -p _site/javadoc
          cp -R target/site/apidocs/. _site/javadoc/

          python3 <<'PY'
          from pathlib import Path

          index = """<!doctype html>
          <html lang="en">
            <head>
              <meta charset="utf-8">
              <meta name="viewport" content="width=device-width, initial-scale=1">
              <title>NovaLanguage Documentation</title>
            </head>
            <body>
              <main>
                <h1>NovaLanguage Documentation</h1>
                <p>This site is generated automatically from the <code>main</code> branch.</p>
                <ul>
                  <li><a href="javadoc/">Generated Javadoc</a></li>
                  <li><a href="https://github.com/${{ github.repository }}/wiki">Project Wiki</a></li>
                  <li><a href="https://github.com/${{ github.repository }}">Repository</a></li>
                </ul>
              </main>
            </body>
          </html>
          """

          Path("_site/index.html").write_text(index, encoding="utf-8")
          PY

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: _site

  deploy-pages:
    name: Deploy Javadoc to GitHub Pages
    runs-on: ubuntu-latest
    needs: build-javadoc

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
