name: Publish documentation

on:
  push:
    branches:
      - main
    paths:
      - 'docs/**'
      - 'src/**'
      - 'pom.xml'
      - 'README.md'
      - 'PLAN.md'
      - '.github/workflows/docs-publish.yml'
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: documentation-publish
  cancel-in-progress: true

jobs:
  publish-wiki:
    name: Mirror docs to GitHub Wiki
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Configure Git author
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Verify wiki repository exists
        env:
          GH_TOKEN: ${{ github.token }}
          WIKI_URL: https://x-access-token:${{ github.token }}@github.com/${{ github.repository }}.wiki.git
        run: |
          if ! git ls-remote "$WIKI_URL" > /dev/null 2>&1; then
            echo "The GitHub Wiki repository does not exist yet or is not accessible."
            echo "Enable the Wiki tab and create the first page manually, then re-run this workflow."
            exit 1
          fi

      - name: Clone wiki repository
        env:
          WIKI_URL: https://x-access-token:${{ github.token }}@github.com/${{ github.repository }}.wiki.git
        run: |
          git clone "$WIKI_URL" wiki-repo

      - name: Mirror Markdown docs
        run: |
          set -euo pipefail

          rm -f wiki-repo/*.md

          if [ -f README.md ]; then
            cp README.md wiki-repo/Home.md
          fi

          if [ -f PLAN.md ]; then
            cp PLAN.md wiki-repo/Compiler-Upgrade-Plan.md
          fi

          if [ -d docs ]; then
            for file in docs/*.md; do
              [ -e "$file" ] || continue
              base="$(basename "$file" .md)"
              wiki_name="$(printf '%s' "$base" | sed -E 's/(^|-)([a-z])/${BASH_REMATCH[1]}\U${BASH_REMATCH[2]}/g' | sed 's/-/ /g')"
              # Bash/sed case conversion is not portable across all sed builds, so use Python for the final name.
              wiki_file="$(python3 - <<'PY' "$base"
import sys
base = sys.argv[1]
words = base.replace('_', '-').split('-')
print('-'.join(word[:1].upper() + word[1:] for word in words if word))
PY
)"
              cp "$file" "wiki-repo/${wiki_file}.md"
            done
          fi

          cat > wiki-repo/_Sidebar.md <<'EOF'
          # NovaLanguage

          - [Home](Home)
          - [Compiler Upgrade Plan](Compiler-Upgrade-Plan)

          ## Documentation

          - [Architecture](Architecture)
          - [Compiler Roadmap](Compiler-Roadmap)
          - [Parser](Parser)
          - [Semantic Analysis](Semantic-Analysis)
          - [Language Design](Language-Design)
          - [Testing](Testing)
          - [Contributing](Contributing)

          ## API

          - [Generated Javadoc](https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/javadoc/)
          EOF

          cat > wiki-repo/API-Reference.md <<'EOF'
          # API Reference

          The generated Javadoc is published automatically from the `main` branch.

          - [Open generated Javadoc](https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/javadoc/)

          The Javadoc is generated by GitHub Actions from the current Java sources and deployed through GitHub Pages.
          EOF

      - name: Commit and push wiki changes
        working-directory: wiki-repo
        run: |
          set -euo pipefail

          if git diff --quiet --exit-code; then
            echo "Wiki is already up to date."
            exit 0
          fi

          git add .
          git commit -m "docs: mirror repository documentation"
          git push

  build-javadoc:
    name: Build Javadoc site
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up JDK
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '26'
          cache: maven
          cache-dependency-path: pom.xml

      - name: Build tests and Javadoc
        run: ./mvnw -B -ntp test javadoc:javadoc

      - name: Prepare Pages site
        run: |
          set -euo pipefail
          mkdir -p _site/javadoc
          cp -R target/site/apidocs/. _site/javadoc/

          cat > _site/index.html <<'EOF'
          <!doctype html>
          <html lang="en">
            <head>
              <meta charset="utf-8">
              <meta name="viewport" content="width=device-width, initial-scale=1">
              <title>NovaLanguage Documentation</title>
            </head>
            <body>
              <main>
                <h1>NovaLanguage Documentation</h1>
                <p>This site is generated automatically from the <code>main</code> branch.</p>
                <ul>
                  <li><a href="javadoc/">Generated Javadoc</a></li>
                  <li><a href="https://github.com/${{ github.repository }}/wiki">Project Wiki</a></li>
                  <li><a href="https://github.com/${{ github.repository }}">Repository</a></li>
                </ul>
              </main>
            </body>
          </html>
          EOF

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: _site

  deploy-pages:
    name: Deploy Javadoc to GitHub Pages
    runs-on: ubuntu-latest
    needs: build-javadoc

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
