name: Sync issue labels

on:
  issues:
    types:
      - opened
      - edited
      - reopened
      - transferred
  workflow_dispatch:
    inputs:
      issue_number:
        description: Issue number to sync. Leave empty when syncing every open issue.
        required: false
        type: string
      sync_all_open:
        description: Sync labels for every open issue in the repository.
        required: false
        default: false
        type: boolean

permissions:
  contents: read
  issues: write

concurrency:
  group: project-label-sync-${{ github.event.issue.number || github.run_id }}
  cancel-in-progress: false

jobs:
  sync-labels:
    name: Sync managed issue labels
    runs-on: ubuntu-latest

    env:
      GITHUB_TOKEN: ${{ github.token }}
      PROJECT_TOKEN: ${{ secrets.PROJECT_TOKEN }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Sync issue event labels
        if: ${{ github.event_name == 'issues' }}
        run: |
          python3 .github/scripts/project_automation.py sync-labels \
            --repo "${GITHUB_REPOSITORY}" \
            --issue-number "${{ github.event.issue.number }}"

      - name: Sync requested issue labels
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.sync_all_open == false && inputs.issue_number != '' }}
        run: |
          python3 .github/scripts/project_automation.py sync-labels \
            --repo "${GITHUB_REPOSITORY}" \
            --issue-number "${{ inputs.issue_number }}"

      - name: Sync all open issue labels
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.sync_all_open == true }}
        run: |
          python3 .github/scripts/project_automation.py sync-labels \
            --repo "${GITHUB_REPOSITORY}" \
            --all-open

      - name: Require manual input
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.sync_all_open == false && inputs.issue_number == '' }}
        run: |
          echo "::error::Provide issue_number or enable sync_all_open."
          exit 1
