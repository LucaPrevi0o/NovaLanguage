name: Check issue forms

on:
  pull_request:
    paths:
      - ".github/ISSUE_TEMPLATE/**"
      - ".github/scripts/issue_forms.py"
      - ".github/scripts/issue_metadata.py"
      - ".github/scripts/project_metadata.py"
      - ".github/scripts/project_automation.py"
      - ".github/scripts/project_schedule.py"
      - ".github/workflows/issue-form-check.yml"
      - ".github/workflows/issue-metadata-check.yml"
      - ".github/workflows/project-schedule-sync.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: issue-form-check-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check-issue-forms:
    name: Check issue-form metadata fields
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Check shared issue-form fields
        run: python3 .github/scripts/issue_forms.py --check

      - name: Check native metadata helper
        run: |
          python3 .github/scripts/issue_metadata.py \
            --issue-number 0 \
            --labels refactor \
            --milestone "Nova MVP compiler"

      - name: Check schedule sync helper syntax
        run: python3 -m py_compile .github/scripts/project_schedule.py
