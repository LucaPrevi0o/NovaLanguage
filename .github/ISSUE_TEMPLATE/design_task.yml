name: Design task
description: Capture a Nova language, compiler architecture, workflow, or roadmap design decision.
title: "design: "
labels:
  - design
body:
  - type: textarea
    id: goal
    attributes:
      label: Goal
      description: Describe the design question or decision this issue should resolve.
      placeholder: State the decision target in one or two sentences.
    validations:
      required: true
  - type: dropdown
    id: priority
    attributes:
      label: Priority
      description: Select the priority used by the roadmap Project.
      options:
        - 0 - Blocks progress
        - 1 - Important next step
        - 2 - Possible next focus
        - 3 - Later addition
      default: 2
    validations:
      required: true
  - type: dropdown
    id: size
    attributes:
      label: Size
      description: Select the expected implementation and review size.
      options:
        - XS
        - S
        - M
        - L
        - XL
      default: 1
    validations:
      required: true
  - type: dropdown
    id: suggested-status
    attributes:
      label: Suggested status
      description: Select the initial roadmap status to write into the Project.
      options:
        - Backlog
        - Ready
        - In Progress
        - Blocked
        - In Review
        - Done
      default: 0
    validations:
      required: true
  - type: textarea
    id: decision
    attributes:
      label: Decision to make
      description: State the specific choice that needs to be made.
    validations:
      required: true
  - type: textarea
    id: context
    attributes:
      label: Context
      description: Link roadmap phases, architecture docs, implementation constraints, or related issues.
      value: |
        Relevant docs:

        - `PLAN.md`
        - `docs/architecture.md`
    validations:
      required: true
  - type: textarea
    id: options
    attributes:
      label: Options considered
      value: |
        ### Option A

        - Pros:
        - Cons:

        ### Option B

        - Pros:
        - Cons:
  - type: textarea
    id: scope
    attributes:
      label: Scope
      value: |
        - [ ] Describe the chosen design and its rationale.
        - [ ] Identify the compiler layers affected by the design.
        - [ ] Identify follow-up implementation issues if the decision is too large for one PR.
    validations:
      required: true
  - type: textarea
    id: out-of-scope
    attributes:
      label: Out of scope
      placeholder: |
        - ...
  - type: textarea
    id: acceptance-criteria
    attributes:
      label: Acceptance criteria
      value: |
        - [ ] The decision is documented in the appropriate docs page or roadmap section.
        - [ ] The design preserves existing phase ordering unless the issue explicitly justifies changing it.
        - [ ] Follow-up implementation issues are listed when needed.
        - [ ] Documentation-only checks pass.
    validations:
      required: true
  - type: textarea
    id: notes
    attributes:
      label: Notes
      description: Add links to related issues, PRs, docs, or open questions.
